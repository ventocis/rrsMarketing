name: Deploy stack on tag push
run-name: "Deploy ${{ github.ref_name }} → qa by @${{ github.actor }}"

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/util-deploy.yml
    with:
      environment: qa
      version_tag: ${{ github.ref_name }}
